syntax = "proto3";
package exa.codeium_common_pb;

option go_package = "codeium_common_pb";

enum ModelProvider {
  MODEL_PROVIDER_UNSPECIFIED = 0;
  MODEL_PROVIDER_ANTIGRAVITY = 1;
  MODEL_PROVIDER_OPENAI = 2;
  MODEL_PROVIDER_ANTHROPIC = 3;
  MODEL_PROVIDER_GOOGLE = 4;
  MODEL_PROVIDER_XAI = 5;
  MODEL_PROVIDER_DEEPSEEK = 6;
}

enum APIProvider {
  API_PROVIDER_UNSPECIFIED = 0;
  API_PROVIDER_INTERNAL = 1;
  API_PROVIDER_GOOGLE_VERTEX = 3;
  API_PROVIDER_GOOGLE_GEMINI = 24;
  API_PROVIDER_ANTHROPIC_VERTEX = 26;
  API_PROVIDER_GOOGLE_EVERGREEN = 30;
  API_PROVIDER_OPENAI_VERTEX = 31;
}

enum ModelType {
  MODEL_TYPE_UNSPECIFIED = 0;
  MODEL_TYPE_COMPLETION = 1;
  MODEL_TYPE_CHAT = 2;
  MODEL_TYPE_EMBED = 3;
  MODEL_TYPE_QUERY = 4;
}

enum ModelStatus {
  MODEL_STATUS_UNSPECIFIED = 0;
  MODEL_STATUS_INFO = 1;
  MODEL_STATUS_WARNING = 2;
}

enum ModelPricingType {
  MODEL_PRICING_TYPE_UNSPECIFIED = 0;
  MODEL_PRICING_TYPE_STATIC_CREDIT = 1;
  MODEL_PRICING_TYPE_API = 2;
  MODEL_PRICING_TYPE_BYOK = 3;
}

message Model {
  string name = 1;
  string display_name = 2;
  string description = 3;
  ModelProvider model_provider = 4;
  APIProvider api_provider = 5;
  ModelType model_type = 6;
  ModelStatus status = 7;
  ModelPricingType pricing_type = 8;
  string api_server_url = 9;
  string inference_api_server_url = 10;
  int32 max_input_tokens = 11;
  int32 max_output_tokens = 12;
}

message Product {
  string product_id = 1;
  string display_name = 2;
  repeated Model models = 3;
}
