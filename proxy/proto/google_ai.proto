syntax = "proto3";
package google_cloud.aiplatform.v1;

option go_package = "content_go_proto";

message GenerateContentRequest {
  string model = 1;
  repeated Content contents = 2;
  SystemInstruction system_instruction = 3;
  repeated Tool tools = 4;
  GenerationConfig generation_config = 5;
  repeated SafetySetting safety_settings = 6;
  string cached_content = 7;
}

message GenerateContentResponse {
  repeated Candidate candidates = 1;
  PromptFeedback prompt_feedback = 2;
  UsageMetadata usage_metadata = 3;
  string model_version = 4;
}

message Candidate {
  Content content = 1;
  FinishReason finish_reason = 2;
  SafetyRatings safety_ratings = 3;
  CitationMetadata citation_metadata = 4;
  int32 index = 5;
  GroundingMetadata grounding_metadata = 6;
}

message Content {
  repeated Part parts = 1;
  string role = 2;
}

message Part {
  string text = 1;
  InlineData inline_data = 2;
  FileData file_data = 3;
  FunctionCall function_call = 4;
  FunctionResponse function_response = 5;
  ExecutableCode executable_code = 6;
  CodeExecutionResult code_execution_result = 7;
}

message InlineData {
  string mime_type = 1;
  bytes data = 2;
}

message FileData {
  string mime_type = 1;
  string file_uri = 2;
}

message FunctionCall {
  string name = 1;
  bytes args = 2;  // JSON-encoded
}

message FunctionResponse {
  string name = 1;
  bytes response = 2;  // JSON-encoded
}

message ExecutableCode {
  string language = 1;
  string code = 2;
}

message CodeExecutionResult {
  string outcome = 1;
  string output = 2;
}

message Tool {
  repeated FunctionDeclaration function_declarations = 1;
  Retrieval retrieval = 2;
  GoogleSearchRetrieval google_search_retrieval = 3;
  CodeExecution code_execution = 4;
}

message FunctionDeclaration {
  string name = 1;
  string description = 2;
  Schema parameters = 3;
  bool optional = 4;
}

message Schema {
  string type = 1;
  string format = 2;
  string description = 3;
  bool nullable = 4;
  repeated string enum = 5;
  repeated Schema items = 6;
  map<string, Schema> properties = 7;
  repeated string required = 8;
  Schema additional_properties = 9;
}

message Retrieval {
  VertexAISearch vertex_ai_search = 1;
  bool disable_attribution = 2;
}

message VertexAISearch {
  string datastore = 1;
}

message GoogleSearchRetrieval {
  bool disable_attribution = 1;
}

message CodeExecution {
}

message GenerationConfig {
  int32 max_output_tokens = 1;
  float temperature = 2;
  float top_p = 3;
  float top_k = 4;
  int32 candidate_count = 5;
  repeated string stop_sequences = 6;
  string response_mime_type = 7;
  int32 seed = 8;
  bool response_logprobs = 9;
  int32 logprobs = 10;
}

message SafetySetting {
  HarmCategory category = 1;
  HarmBlockThreshold threshold = 2;
}

enum HarmCategory {
  HARM_CATEGORY_UNSPECIFIED = 0;
  HARM_CATEGORY_HATE_SPEECH = 1;
  HARM_CATEGORY_DANGEROUS_CONTENT = 2;
  HARM_CATEGORY_HARASSMENT = 3;
  HARM_CATEGORY_SEXUALLY_EXPLICIT = 4;
}

enum HarmBlockThreshold {
  HARM_BLOCK_THRESHOLD_UNSPECIFIED = 0;
  BLOCK_LOW_AND_ABOVE = 1;
  BLOCK_MEDIUM_AND_ABOVE = 2;
  BLOCK_ONLY_HIGH = 3;
  BLOCK_NONE = 4;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  FINISH_REASON_STOP = 1;
  FINISH_REASON_MAX_TOKENS = 2;
  FINISH_REASON_SAFETY = 3;
  FINISH_REASON_RECITATION = 4;
  FINISH_REASON_OTHER = 5;
  FINISH_REASON_BLOCKLIST = 6;
  FINISH_REASON_PROHIBITED_CONTENT = 7;
  FINISH_REASON_SPII = 8;
  FINISH_REASON_MALFORMED_FUNCTION_CALL = 9;
}

message SafetyRatings {
  repeated SafetyRating ratings = 1;
}

message SafetyRating {
  HarmCategory category = 1;
  HarmBlockThreshold probability = 2;
  bool blocked = 3;
}

message CitationMetadata {
  repeated Citation citations = 1;
}

message Citation {
  string uri = 1;
  int32 start_index = 2;
  int32 end_index = 3;
  string title = 4;
  string license = 5;
  string publication_date = 6;
}

message GroundingMetadata {
  repeated GroundingChunk grounding_chunks = 1;
  repeated GroundingSupport grounding_supports = 2;
  bool web_search_queries = 3;
}

message GroundingChunk {
  string uri = 1;
  string title = 2;
  string text = 3;
}

message GroundingSupport {
  repeated int32 segment_indices = 1;
  float confidence_score = 2;
}

message PromptFeedback {
  repeated SafetyRating safety_ratings = 1;
  BlockedReason blocked_reason = 2;
}

enum BlockedReason {
  BLOCKED_REASON_UNSPECIFIED = 0;
  BLOCKED_REASON_SAFETY = 1;
  BLOCKED_REASON_OTHER = 2;
}

message UsageMetadata {
  int32 prompt_token_count = 1;
  int32 candidates_token_count = 2;
  int32 total_token_count = 3;
}

message SystemInstruction {
  repeated Part parts = 1;
  string role = 2;
}

message StreamGenerateContentResponse {
  repeated Candidate candidates = 1;
  string model_version = 2;
}
