<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <title>Sign in · Antigravity Proxy</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23b85542'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f0e9dc;
      --bg-soft: #e8e0d0;
      --surface: #fbf7ed;
      --surface-2: #f4ede1;
      --border: #e3d9c2;
      --border-strong: #d4c8ad;
      --text: #2a241d;
      --text-2: #5d5448;
      --text-3: #968b78;
      --accent: #b85542;
      --accent-hover: #9d4634;
      --accent-soft: #f3dcd2;
      --error: #b84a3a;
      --error-soft: #f0c8b8;
      --shadow: 0 8px 32px rgba(80,60,30,0.08);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0f0f12;
      --bg-soft: #0a0a0c;
      --surface: #18181d;
      --surface-2: #1f1f25;
      --border: #27272d;
      --border-strong: #36363e;
      --text: #e8e8ec;
      --text-2: #a0a0aa;
      --text-3: #6a6a75;
      --accent: #e0c084;
      --accent-hover: #efce94;
      --accent-soft: rgba(224,192,132,0.12);
      --error: #d96a5a;
      --error-soft: rgba(217,106,90,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-2);
      transition: all 120ms;
    }
    .theme-toggle:hover { background: var(--surface-2); color: var(--text); }
    .theme-toggle svg { width: 16px; height: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 28px;
    }
    .brand .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: white;
    }
    .brand .logo svg { width: 28px; height: 28px; }
    .brand h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .brand p {
      font-size: 13px;
      color: var(--text-2);
    }

    form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.01em;
    }
    .field input {
      padding: 10px 14px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: all 120ms;
      font-family: inherit;
    }
    .field input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .field input::placeholder { color: var(--text-3); }

    .submit {
      margin-top: 6px;
      padding: 11px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms;
      font-family: inherit;
    }
    .submit:hover { background: var(--accent-hover); }
    .submit:active { transform: scale(0.98); }
    .submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      padding: 10px 14px;
      background: var(--error-soft);
      color: var(--error);
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }

    .hint {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
      line-height: 1.5;
    }
    .hint code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 2px 6px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-2);
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
  <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="card">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <h1>Antigravity Proxy</h1>
    <p>Sign in to manage your proxy</p>
  </div>

  <div class="error" id="error"></div>

  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="submit" type="submit" id="submitBtn">Sign in</button>
  </form>

  <div class="hint">
    Credentials are configured in <code>.env</code> via <code>DASHBOARD_USER</code> and <code>DASHBOARD_PASSWORD</code>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const nextUrl = params.get('next') || '/';

const stored = localStorage.getItem('ag_theme') || 'dark';
document.documentElement.setAttribute('data-theme', stored);

const themeBtn = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const updateIcon = () => {
  if (document.documentElement.getAttribute('data-theme') === 'light') {
    themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
};
updateIcon();
themeBtn.addEventListener('click', () => {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ag_theme', t);
  updateIcon();
});

fetch('/api/auth/me', { credentials: 'same-origin' })
  .then(r => r.ok ? r.json() : null)
  .then(d => { if (d && d.username) location.replace(nextUrl); })
  .catch(() => {});

const form = document.getElementById('loginForm');
const errBox = document.getElementById('error');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Invalid credentials');
    }
    location.replace(nextUrl);
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
